{% extends "base.html" %}

{% block title %}Editar Moto{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:600px;">

  <div class="mb-4">
    <a href="{{ url_for('motos.index') }}" class="btn-back-striking"><i class="fas fa-chevron-left"></i> VOLVER</a>
  </div>

  <div class="page-header">
    <h1 class="page-title">Editar <span>Moto</span></h1>
    <p class="page-subtitle">Modifica las especificaciones técnicas</p>
  </div>

  <div class="card-brazo">
    <form method="POST">

      <div class="mb-3">
        <label class="form-label-brazo">Marca</label>
        <input type="text" name="marca" value="{{ moto.marca }}" class="form-input-brazo" required>
      </div>

      <div class="mb-3">
        <label class="form-label-brazo">Modelo</label>
        <input type="text" name="modelo" value="{{ moto.modelo }}" class="form-input-brazo" required>
      </div>

      <div class="mb-3">
        <label class="form-label-brazo">Año</label>
        <input type="number" name="año" value="{{ moto.año }}" class="form-input-brazo">
      </div>

      <div class="mb-3">
        <label class="form-label-brazo">Color</label>
        <input type="text" name="color" value="{{ moto.color }}" class="form-input-brazo">
      </div>

      <div class="mb-3">
        <label class="form-label-brazo">Cilindraje</label>
        <input type="text" name="cilindraje" value="{{ moto.cilindraje }}" class="form-input-brazo">
      </div>

      <div class="d-flex gap-3 mt-4">
        <button class="btn-primary-brazo">
          💾 Actualizar
        </button>
        <a href="{{ url_for('motos.index') }}" class="btn-outline-brazo">
          Cancelar
        </a>
      </div>

    </form>
  </div>

</div>
{% endblock %}
