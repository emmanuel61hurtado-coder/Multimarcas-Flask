<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimarcas Brazo - Racing Experience</title>
    <style>
        :root {
            --red: #E8000D;
            --red-glow: rgba(232, 0, 13, 0.6);
            --accent: #E0E0E0;
            --bg: #050505;
            --panel: rgba(20, 20, 22, 0.8);
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🏁 HYPER-MODERN BACKGROUND */
        .hud-ambient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 50% 50%, rgba(232, 0, 13, 0.05) 0%, transparent 70%),
                url('https://images.unsplash.com/photo-1591637333184-19aa84b3e01f?auto=format&fit=crop&w=1920&q=90') no-repeat center center/cover;
            opacity: 0.4;
            z-index: -1;
            filter: grayscale(100%) contrast(150%);
        }

        .hud-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(232,0,13,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232,0,13,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* 📡 SCAN BEAM */
        .scanline {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 5px;
            background: var(--red);
            box-shadow: 0 0 20px var(--red);
            opacity: 0.3;
            z-index: 100;
            animation: scanning 4s linear infinite;
        }

        @keyframes scanning {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* 🌀 CENTRAL CORE */
        .hud-core {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo-ring-wrap {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border: 2px solid transparent;
            border-radius: 50%;
            transition: 0.5s;
        }

        .ring-1 { width: 100%; height: 100%; border-top: 2px solid var(--red); border-bottom: 2px solid var(--red); animation: rotate 10s linear infinite; opacity: 0.2; }
        .ring-2 { width: 90%; height: 90%; border-left: 2px solid var(--accent); border-right: 2px solid var(--accent); animation: rotate 15s linear reverse infinite; opacity: 0.1; }
        .ring-3 { width: 110%; height: 110%; border: 1px dashed var(--red); animation: rotate 20s linear infinite; opacity: 0.05; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .welcome-logo {
            width: 420px;
            height: auto;
            z-index: 5;
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 40px var(--red-glow));
            animation: logoPulse 4s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px var(--red-glow)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 60px var(--red-glow)) brightness(1.2); }
        }

        /* 📊 SIDE IMAGE CARDS (REPLACING TELEMETRY) */
        .side-image-card {
            position: fixed;
            width: 320px;
            height: 450px;
            background: var(--panel);
            border: 1px solid var(--border);
            overflow: hidden;
            z-index: 5;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }

        .side-image-card:hover {
            width: 380px;
            z-index: 20;
            border-color: var(--red);
            box-shadow: 0 0 50px rgba(232,0,13,0.3);
        }

        .side-card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.8) contrast(1.2);
            transition: 0.6s;
        }

        .side-image-card:hover .side-card-img {
            filter: grayscale(0) contrast(1.1) brightness(1.1);
            transform: scale(1.05);
        }

        .side-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            text-align: left;
        }

        .side-card-tag {
            background: var(--red);
            color: white;
            font-size: 10px;
            padding: 3px 10px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            align-self: flex-start;
            transform: skewX(-15deg);
        }

        .side-card-title {
            font-size: 28px;
            font-weight: 900;
            font-style: italic;
            line-height: 0.9;
            text-transform: uppercase;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .panel-left { top: 50%; left: 40px; transform: translateY(-50%) skewY(-2deg); border-left: 4px solid var(--red); }
        .panel-right { top: 50%; right: 40px; transform: translateY(-50%) skewY(2deg); border-right: 4px solid var(--red); }

        /* 🕹️ COMMAND BUTTONS */
        .command-center {
            display: flex;
            gap: 30px;
            perspective: 1000px;
        }

        .btn-hud {
            position: relative;
            padding: 25px 70px;
            background: rgba(232, 0, 13, 0.1);
            border: 1px solid var(--red);
            color: white;
            text-decoration: none;
            font-weight: 950;
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.3s;
            overflow: hidden;
            transform: rotateX(20deg);
            box-shadow: 0 10px 0 var(--red), 0 20px 40px rgba(0,0,0,0.5);
        }

        .btn-hud::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-hud:hover {
            transform: rotateX(0deg) translateY(-10px);
            background: var(--red);
            box-shadow: 0 0 40px var(--red-glow);
        }

        .btn-hud:hover::before { left: 100%; }

        .btn-hud.secondary {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 10px 0 var(--accent), 0 20px 40px rgba(0,0,0,0.5);
        }

        .btn-hud.secondary:hover {
            background: white;
            color: black;
            box-shadow: 0 0 40px rgba(255,255,255,0.2);
        }

        @media (max-width: 1100px) {
            .telemetry-panel { display: none; }
            .logo-ring-wrap { width: 300px; height: 300px; }
            .welcome-logo { width: 280px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="hud-ambient"></div>
    <div class="hud-grid"></div>
    <div class="scanline"></div>

    <div class="panel-left side-image-card">
        <img src="{{ url_for('static', filename='img/moto_cornering.png') }}" class="side-card-img">
        <div class="side-card-overlay">
            <div class="side-card-tag">ENGINEERING</div>
            <div class="side-card-title">POTENCIA <br> SIN LÍMITES</div>
        </div>
    </div>

    <div class="panel-right side-image-card">
        <img src="{{ url_for('static', filename='img/moto_speed.png') }}" class="side-card-img">
        <div class="side-card-overlay">
            <div class="side-card-tag">PERFORMANCE</div>
            <div class="side-card-title">PASIÓN POR <br> LA VELOCIDAD</div>
        </div>
    </div>

    <div class="hud-core">
        <div class="logo-ring-wrap">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <img src="{{ url_for('static', filename='img/logo_brazo.png') }}" alt="Logo Brazo" class="welcome-logo">
        </div>

        <div class="command-center">
            {% if current_user.is_authenticated %}
                {% if current_user.is_empleado() %}
                    <a href="{{ url_for('admin.dashboard') }}" class="btn-hud">INICIAR CENTRO DE MANDO</a>
                {% else %}
                    <a href="{{ url_for('cliente.dashboard') }}" class="btn-hud">ENTRAR A PITS</a>
                {% endif %}
            {% else %}
                <a href="{{ url_for('auth.login') }}" class="btn-hud">ENTRAR A PISTA</a>
                <a href="{{ url_for('auth.register') }}" class="btn-hud secondary">UNIRSE AL EQUIPO</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
