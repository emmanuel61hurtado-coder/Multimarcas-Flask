{% extends "base.html" %}

{% block title %}Nueva Contraseña - Multimarcas Brazo{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 150px);">
    <div class="card-brazo" style="max-width: 450px; width: 100%; border-top: 4px solid #10b981;">
        <div class="card-header text-center pt-4 pb-0" style="background: transparent; border-bottom: none;">
            <div class="mb-3">
                <i class="fas fa-key" style="font-size: 40px; color: #10b981; transform: skewX(-10deg);"></i>
            </div>
            <h3 style="font-family: var(--font-display); font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: 1px; color: var(--text);">
                Nueva <span style="color: #10b981;">Contraseña</span>
            </h3>
            <p class="text-muted small px-3">
                Ingresa tu nueva contraseña para acceder al sistema.
            </p>
        </div>
        <div class="card-body p-4">
            <form action="{{ url_for('auth.reset_password_with_token', token=token) }}" method="POST">
                <div class="mb-3">
                    <label class="form-label-brazo"><i class="fas fa-lock me-2 text-muted"></i>NUEVA CONTRASEÑA</label>
                    <input type="password" name="password" class="form-input-brazo" placeholder="********" required autofocus minlength="6">
                </div>
                
                <div class="mb-4">
                    <label class="form-label-brazo"><i class="fas fa-check-circle me-2 text-muted"></i>CONFIRMAR CONTRASEÑA</label>
                    <input type="password" name="confirm_password" class="form-input-brazo" placeholder="********" required minlength="6">
                </div>
                
                <div class="d-grid gap-3">
                    <button type="submit" class="btn-primary-brazo py-3" style="background: linear-gradient(135deg, #10b981, #059669); border-color: #10b981; font-size: 14px; letter-spacing: 2px; justify-content: center;">
                        <i class="fas fa-save me-2"></i> GUARDAR CONTRASEÑA
                    </button>
                    
                    <a href="{{ url_for('auth.login') }}" class="btn-outline-brazo text-center py-2" style="font-size: 12px; border-color: rgba(255,255,255,0.1);">
                        <i class="fas fa-times me-2"></i> CANCELAR
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
